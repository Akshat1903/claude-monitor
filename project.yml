name: ClaudeWidget
options:
  bundleIdPrefix: dev.fox.claudewidget
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "A6UG9Q92CB"
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    SWIFT_STRICT_CONCURRENCY: minimal

targets:

  ClaudeWidgetApp:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: Shared
    info:
      path: App/Info.plist
      properties:
        CFBundleName: ClaudeWidget
        CFBundleDisplayName: Claude Widget
        LSUIElement: true
        LSMinimumSystemVersion: "14.0"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.fox.claudewidget.app
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: ""
